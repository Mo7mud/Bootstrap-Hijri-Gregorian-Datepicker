<!DOCTYPE html>
<html lang="en" id="html-root" dir="ltr">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <title>Master Hijri/Gregorian Picker - All Options Playground</title>

    <link href="https://stackpath.bootstrapcdn.com/bootstrap/4.4.1/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css" rel="stylesheet">
    <link href="css/bootstrap-datetimepicker.min.css" rel="stylesheet" />

    <style>
        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background-color: #f8f9fa;
            color: #333;
        }

        .sidebar {
            height: 100vh;
            position: sticky;
            top: 0;
            background: #fff;
            border-right: 1px solid #dee2e6;
            overflow-y: auto;
            z-index: 1000;
        }

        .sidebar-header {
            padding: 25px 20px;
            background: #2c3e50;
            color: #fff;
            border-bottom: 4px solid #3498db;
        }

        .accordion .card {
            border: none;
            border-bottom: 1px solid #f0f0f0;
        }

        .accordion .card-header {
            background: #fff;
            padding: 0;
        }

        .accordion .btn-link {
            width: 100%;
            text-align: left;
            padding: 15px 20px;
            color: #2c3e50;
            font-weight: 600;
            text-decoration: none;
            display: flex;
            align-items: center;
        }

        .accordion .btn-link i {
            width: 25px;
            color: #3498db;
        }

        .accordion .btn-link.collapsed {
            color: #7f8c8d;
        }

        .main-content {
            padding: 50px 30px;
        }

        .preview-card {
            border-radius: 15px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.1);
            border: none;
            background: #fff;
        }

        .apply-btn-wrapper {
            padding: 20px;
            position: sticky;
            bottom: 0;
            background: #fff;
            border-top: 1px solid #eee;
        }

        .badge-preset {
            font-size: 0.7rem;
            background: #e8f4fd;
            color: #3498db;
            padding: 2px 6px;
            border-radius: 4px;
            margin-left: 5px;
        }

        pre#code-preview {
            max-height: 400px;
        }
    </style>
</head>

<body>

    <div class="container-fluid">
        <div class="row">
            <nav class="col-md-5 col-lg-4 sidebar">
                <div class="sidebar-header">
                    <h5 class="mb-1">UI Logic Architect</h5>
                    <p class="small mb-0 opacity-75">Full Options Configurator</p>
                </div>

                <form id="config-form">
                    <div class="accordion" id="masterAccordion">

                        <div class="card">
                            <div class="card-header">
                                <button class="btn btn-link" type="button" data-toggle="collapse"
                                    data-target="#secGeneral">
                                    <i class="fas fa-globe"></i> Core & Locales
                                </button>
                            </div>
                            <div id="secGeneral" class="collapse show" data-parent="#masterAccordion">
                                <div class="card-body">
                                    <div class="custom-control custom-switch mb-2">
                                        <input type="checkbox" class="custom-control-input" id="hijri" >
                                        <label class="custom-control-label" for="hijri">Hijri</label>
                                    </div>
                                    <div class="custom-control custom-switch mb-2">
                                        <input type="checkbox" class="custom-control-input" id="showSwitcher" checked>
                                        <label class="custom-control-label" for="showSwitcher">Enable Mode
                                            Switcher</label>
                                    </div>
                                    <div class="custom-control custom-switch mb-3">
                                        <input type="checkbox" class="custom-control-input" id="isRTL">
                                        <label class="custom-control-label" for="isRTL">RTL Mode (Force View)</label>
                                    </div>
                                    <div class="form-group">
                                        <label>Locale Selection</label>
                                        <select class="form-control form-control-sm" id="locale">
                                            <option value="en-us" selected>English (US)</option>
                                            <option value="ar-sa">Arabic (Saudi Arabia)</option>
                                        </select>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <div class="card">
                            <div class="card-header">
                                <button class="btn btn-link collapsed" type="button" data-toggle="collapse"
                                    data-target="#secFormats">
                                    <i class="fas fa-clock"></i> Formats & Time Logic
                                </button>
                            </div>
                            <div id="secFormats" class="collapse" data-parent="#masterAccordion">
                                <div class="card-body">
                                    <div class="form-group">
                                        <label>Gregorian Format</label>
                                        <select class="form-control form-control-sm" id="format">
                                            <optgroup label="Date & Time (Required for Time Picker)">
                                                <option value="YYYY-MM-DD HH:mm" selected>YYYY-MM-DD HH:mm (24-Hour)
                                                </option>
                                                <option value="YYYY-MM-DD hh:mm A">YYYY-MM-DD hh:mm A (12-Hour AM/PM)
                                                </option>
                                                <option value="DD/MM/YYYY HH:mm:ss">DD/MM/YYYY HH:mm:ss (With Seconds)
                                                </option>
                                            </optgroup>
                                            <optgroup label="Date Only">
                                                <option value="YYYY-MM-DD">YYYY-MM-DD</option>
                                                <option value="DD/MM/YYYY">DD/MM/YYYY</option>
                                                <option value="MM-DD-YYYY">MM-DD-YYYY</option>
                                            </optgroup>
                                        </select>
                                    </div>

                                    <div class="form-group">
                                        <label>Hijri Format</label>
                                        <select class="form-control form-control-sm" id="hijriFormat">
                                            <optgroup label="Date & Time (Required for Time Picker)">
                                                <option value="iYYYY-iMM-iDD HH:mm" selected>iYYYY-iMM-iDD HH:mm
                                                    (24-Hour)</option>
                                                <option value="iYYYY-iMM-iDD hh:mm A">iYYYY-iMM-iDD hh:mm A (12-Hour
                                                    AM/PM)</option>
                                                <option value="iDD/iMM/iYYYY HH:mm:ss">iDD/iMM/iYYYY HH:mm:ss (With
                                                    Seconds)</option>
                                            </optgroup>
                                            <optgroup label="Date Only">
                                                <option value="iYYYY-iMM-iDD">iYYYY-iMM-iDD</option>
                                                <option value="iDD/iMM/iYYYY">iDD/iMM/iYYYY</option>
                                            </optgroup>
                                        </select>
                                    </div>

                                    <div class="form-group">
                                        <label>Stepping (Minutes)</label>
                                        <input type="number" class="form-control form-control-sm" id="stepping"
                                            value="1">
                                    </div>
                                    <div class="custom-control custom-switch">
                                        <input type="checkbox" class="custom-control-input" id="sideBySide">
                                        <label class="custom-control-label" for="sideBySide">Side by Side
                                            (Time/Date)</label>
                                        <small class="d-block text-muted mt-1" style="font-size: 0.75rem;">Note: Works
                                            only if selected format includes Time.</small>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <div class="card">
                            <div class="card-header">
                                <button class="btn btn-link collapsed" type="button" data-toggle="collapse"
                                    data-target="#secConstraints">
                                    <i class="fas fa-ban"></i> Advanced Constraints <span class="badge-preset">Smart
                                        Presets</span>
                                </button>
                            </div>
                            <div id="secConstraints" class="collapse" data-parent="#masterAccordion">
                                <div class="card-body">
                                    <div class="custom-control custom-switch mb-3">
                                        <input type="checkbox" class="custom-control-input" id="useDisabledDates">
                                        <label class="custom-control-label" for="useDisabledDates">Block next 5 days <i
                                                class="fas fa-info-circle small text-muted"
                                                title="Automatic preset: Today + 5 days"></i></label>
                                    </div>
                                    <div class="custom-control custom-switch mb-3">
                                        <input type="checkbox" class="custom-control-input" id="useDisabledHours">
                                        <label class="custom-control-label" for="useDisabledHours">Block Night Hours <i
                                                class="fas fa-info-circle small text-muted"
                                                title="Automatic preset: 00:00 to 06:00"></i></label>
                                    </div>
                                    <div class="custom-control custom-switch mb-3">
                                        <input type="checkbox" class="custom-control-input" id="useDaysOfWeekDisabled">
                                        <label class="custom-control-label" for="useDaysOfWeekDisabled">Disable Weekends
                                            <i class="fas fa-info-circle small text-muted"
                                                title="Friday and Saturday"></i></label>
                                    </div>
                                    <div class="form-row">
                                        <div class="form-group col-6">
                                            <label>Min Date</label>
                                            <input type="text" class="form-control form-control-sm" id="minDate"
                                                value="1950-01-01">
                                        </div>
                                        <div class="form-group col-6">
                                            <label>Max Date</label>
                                            <input type="text" class="form-control form-control-sm" id="maxDate"
                                                value="2070-01-01">
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <div class="card">
                            <div class="card-header">
                                <button class="btn btn-link collapsed" type="button" data-toggle="collapse"
                                    data-target="#secUI">
                                    <i class="fas fa-paint-brush"></i> Icons & UI Components
                                </button>
                            </div>
                            <div id="secUI" class="collapse" data-parent="#masterAccordion">
                                <div class="card-body">
                                    <div class="custom-control custom-switch mb-2">
                                        <input type="checkbox" class="custom-control-input" id="showTodayButton"
                                            checked>
                                        <label class="custom-control-label" for="showTodayButton">Today Button</label>
                                    </div>
                                    <div class="custom-control custom-switch mb-2">
                                        <input type="checkbox" class="custom-control-input" id="showClear" checked>
                                        <label class="custom-control-label" for="showClear">Clear Button</label>
                                    </div>
                                    <div class="custom-control custom-switch mb-2">
                                        <input type="checkbox" class="custom-control-input" id="showClose" checked>
                                        <label class="custom-control-label" for="showClose">Close Button</label>
                                    </div>
                                    <div class="custom-control custom-switch mb-3">
                                        <input type="checkbox" class="custom-control-input" id="calendarWeeks">
                                        <label class="custom-control-label" for="calendarWeeks">Display Week
                                            Numbers</label>
                                    </div>
                                    <div class="form-group">
                                        <label>Toolbar Placement</label>
                                        <select class="form-control form-control-sm" id="toolbarPlacement">
                                            <option value="default">Default</option>
                                            <option value="top">Top</option>
                                            <option value="bottom">Bottom</option>
                                        </select>
                                    </div>
                                    <div class="custom-control custom-switch">
                                        <input type="checkbox" class="custom-control-input" id="useCustomIcons">
                                        <label class="custom-control-label" for="useCustomIcons">Use Fancy Icons <span
                                                class="badge-preset">Preset</span></label>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <div class="card">
                            <div class="card-header">
                                <button class="btn btn-link collapsed" type="button" data-toggle="collapse"
                                    data-target="#secDev">
                                    <i class="fas fa-code"></i> Behavior & Debug
                                </button>
                            </div>
                            <div id="secDev" class="collapse" data-parent="#masterAccordion">
                                <div class="card-body">
                                    <div class="custom-control custom-switch mb-2">
                                        <input type="checkbox" class="custom-control-input" id="debug">
                                        <label class="custom-control-label" for="debug">Debug Mode (Stay Open)</label>
                                    </div>
                                    <div class="custom-control custom-switch mb-2">
                                        <input type="checkbox" class="custom-control-input" id="keepOpen">
                                        <label class="custom-control-label" for="keepOpen">Keep Open on Select</label>
                                    </div>
                                    <div class="custom-control custom-switch mb-2">
                                        <input type="checkbox" class="custom-control-input" id="ignoreReadonly">
                                        <label class="custom-control-label" for="ignoreReadonly">Ignore Readonly
                                            Input</label>
                                    </div>
                                    <div class="custom-control custom-switch">
                                        <input type="checkbox" class="custom-control-input" id="allowInputToggle">
                                        <label class="custom-control-label" for="allowInputToggle">Allow Input Click
                                            Toggle</label>
                                    </div>
                                </div>
                            </div>
                        </div>

                    </div>

                    <div class="apply-btn-wrapper">
                        <button type="button" id="apply-settings" class="btn btn-primary btn-block btn-lg shadow">
                            <i class="fas fa-play-circle mr-2"></i> Update Component
                        </button>
                    </div>
                </form>
            </nav>

            <main class="col-md-7 col-lg-8 main-content">
                <div class="text-center mb-5">
                    <h2 class="font-weight-bold">Hijri & Gregorian Picker Laboratory</h2>
                    <p class="text-muted">A comprehensive test-bed for version 4.17.37 (Modified)</p>
                </div>

                <div class="row justify-content-center">
                    <div class="col-md-11">
                        <div class="card preview-card p-5 mb-5 border-0">
                            <div class="form-group mb-0">
                                <label for="hijri-picker" class="h5 mb-4 text-primary">Live Preview Instance:</label>
                                <div id="picker-container" class="input-group input-group-lg">
                                    <div class="input-group-prepend">
                                        <span class="input-group-text bg-white border-right-0"><i
                                                class="fas fa-calendar-day text-secondary"></i></span>
                                    </div>
                                    <input id="hijri-picker" type="text" class="form-control border-left-0 bg-white"
                                        placeholder="Pick a date to see logic in action..." />
                                </div>
                                <div id="info-log" class="mt-3 small text-info font-italic"></div>
                            </div>
                        </div>

                        <div class="mt-4">
                            <div class="d-flex justify-content-between align-items-center mb-2">
                                <h6 class="font-weight-bold mb-0 text-secondary"><i class="fas fa-terminal mr-2"></i>
                                    Javascript Implementation:</h6>
                                <button class="btn btn-sm btn-outline-secondary" onclick="copyCode()">Copy Code</button>
                            </div>
                            <pre class="bg-dark text-light p-4 rounded shadow-lg border-0" id="code-preview"
                                style="font-size: 0.85rem; line-height: 1.6;">
// Your generated configuration will be here...
                            </pre>
                        </div>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.4.1/jquery.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/popper.js/1.16.0/umd/popper.min.js"></script>
    <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.4.1/js/bootstrap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/moment.js/2.22.1/moment-with-locales.min.js"></script>

    <script src="js/bootstrap-hijri-datetimepicker.min.js"></script>

    <script type="text/javascript">
        $(function () {
            initPicker();

            $('#apply-settings').click(function () {
                // Direction Logic
                const isRTL = $('#isRTL').is(':checked');
                $('#html-root').attr('dir', isRTL ? 'rtl' : 'ltr');

                // Refresh DOM completely to avoid plugin state pollution
                $('#picker-container').html(`
                    <div class="input-group-prepend">
                        <span class="input-group-text bg-white border-right-0"><i class="fas fa-calendar-day text-secondary"></i></span>
                    </div>
                    <input id="hijri-picker" type="text" class="form-control border-left-0 bg-white" placeholder="Pick a date to see logic in action..." />
                `);

                initPicker();

                // Visual feedback
                const btn = $(this);
                btn.html('<i class="fas fa-check-circle mr-2"></i> Instance Updated').addClass('btn-success');
                setTimeout(() => btn.html('<i class="fas fa-play-circle mr-2"></i> Update Component').removeClass('btn-success'), 2000);
            });
        });

        function initPicker() {
            const currentLocale = $('#locale').val();
            const isArabic = currentLocale === 'ar-sa';
            const log = $('#info-log');
            log.empty();

            // --- SMART PRESET LOGIC GENERATION ---

            // 1. Generate 5 disabled dates starting from tomorrow
            let disabledDatesArr = [];
            if ($('#useDisabledDates').is(':checked')) {
                for (let i = 1; i <= 5; i++) {
                    disabledDatesArr.push(moment().add(i, 'days').format('YYYY-MM-DD'));
                }
                log.append('<div><i class="fas fa-info-circle"></i> Note: Next 5 days are blocked.</div>');
            }

            // 2. Disabled Hours Preset (00:00 to 06:00)
            let disabledHoursArr = $('#useDisabledHours').is(':checked') ? [0, 1, 2, 3, 4, 5, 6] : false;
            if (disabledHoursArr) log.append('<div><i class="fas fa-info-circle"></i> Note: Late night hours (0-6) are blocked.</div>');

            // 3. Weekends Preset
            let dayOfWeekDisabledArr = $('#useDaysOfWeekDisabled').is(':checked') ? [5, 6] : false;
            if (dayOfWeekDisabledArr) log.append('<div><i class="fas fa-info-circle"></i> Note: Fridays & Saturdays are blocked.</div>');

            // 4. Custom Icons Preset
            let iconSet = $('#useCustomIcons').is(':checked') ? {
                time: 'fas fa-stopwatch text-danger',
                date: 'fas fa-calendar-check text-success',
                up: 'fas fa-arrow-circle-up',
                down: 'fas fa-arrow-circle-down',
                previous: '«',
                next: '»',
                today: 'Now',
                clear: 'Empty',
                close: 'Dismiss'
            } : null;

            // --- MASTER OPTIONS OBJECT ---
            const settings = {
                // Core
                hijri: $('#hijri').is(':checked'),
                showSwitcher: $('#showSwitcher').is(':checked'),
                locale: currentLocale,
                isRTL: $('#isRTL').is(':checked'),

                // Formats
                format: $('#format').val(),
                hijriFormat: $('#hijriFormat').val(),
                stepping: parseInt($('#stepping').val()) || 1,
                sideBySide: $('#sideBySide').is(':checked'),

                // Constraints (Presets)
                disabledDates: disabledDatesArr.length > 0 ? disabledDatesArr : false,
                disabledHours: disabledHoursArr,
                daysOfWeekDisabled: dayOfWeekDisabledArr,
                minDate: $('#minDate').val() || false,
                maxDate: $('#maxDate').val() || false,

                // UI
                showTodayButton: $('#showTodayButton').is(':checked'),
                showClear: $('#showClear').is(':checked'),
                showClose: $('#showClose').is(':checked'),
                calendarWeeks: $('#calendarWeeks').is(':checked'),
                toolbarPlacement: $('#toolbarPlacement').val(),
                viewMode: $('#viewMode').val(),

                // Behavior
                debug: $('#debug').is(':checked'),
                keepOpen: $('#keepOpen').is(':checked'),
                ignoreReadonly: $('#ignoreReadonly').is(':checked'),
                allowInputToggle: $('#allowInputToggle').is(':checked'),
                useCurrent: true // Standard recommended
            };

            // Apply Icon Set if enabled
            if (iconSet) settings.icons = iconSet;

            // Localization Strings Override (Consistency Fix)
            settings.hijriText = isArabic ? "هجري" : "Hijri";
            settings.gregorianText = isArabic ? "ميلادي" : "Gregorian";

            // --- INITIALIZE ---
            $("#hijri-picker").hijriDatePicker(settings);

            // --- UPDATE DEVELOPER PREVIEW ---
            updateCodePreview(settings);
        }

        function updateCodePreview(settings) {
            // Clean settings object for cleaner display
            const previewObj = JSON.parse(JSON.stringify(settings));

            // Format dates array for readability in code
            if (Array.isArray(previewObj.disabledDates)) {
                previewObj.disabledDates = previewObj.disabledDates.map(d => d + " (Auto-Generated)");
            }

            const codeSnippet = `$("#hijri-picker").hijriDatePicker(${JSON.stringify(previewObj, null, 4)});`;
            $('#code-preview').text(codeSnippet);
        }

        function copyCode() {
            const text = $('#code-preview').text();
            navigator.clipboard.writeText(text).then(() => alert('Code copied to clipboard!'));
        }
    </script>

</body>

</html>
